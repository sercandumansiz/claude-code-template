name: Track Update Pipeline

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to analyze"
        required: true
        type: string
      notes:
        description: "Optional context or focus areas"
        required: false
        type: string
  repository_dispatch:
    types: [track-update]

jobs:
  track-update:
    if: >-
      (github.event_name == 'issues' && startsWith(github.event.issue.title, 'track:')) ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract URL from trigger
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            URL=$(echo "${{ github.event.issue.title }}" | sed 's/^track:[[:space:]]*//')
            NOTES=$(cat <<'BODY'
          ${{ github.event.issue.body }}
          BODY
          )
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            URL="${{ inputs.url }}"
            NOTES="${{ inputs.notes }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            URL="${{ github.event.client_payload.url }}"
            NOTES="${{ github.event.client_payload.notes }}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run track-update pipeline
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the /track-update pipeline for this URL: ${{ steps.extract.outputs.url }}

            Additional context: ${{ steps.extract.outputs.notes }}

            Follow the pipeline defined in .claude/skills/track-update/SKILL.md.
            After completing, provide a clear summary of the decision and actions taken.

      - name: Comment results on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Track Update Complete\n\nThe pipeline has finished processing. Check the [Actions run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for full details.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['track-update', 'automated']
            });
